site_name: Ayerstone Setting Guide
site_description: Player-facing Arkflight and Ayerstone campaign guide
site_url: https://p1ng3r.github.io/Ayerstone-Setting-Guide/
repo_url: https://github.com/p1ng3r/Ayerstone-Setting-Guide
repo_name: p1ng3r/Ayerstone-Setting-Guide

extra_css:
  - stylesheets/ayerstone.css
  - stylesheets/house-banners.css
  - stylesheets/house-glance.css
  - stylesheets/house-power.css
  - stylesheets/house-feature.css

theme:
  name: material
  language: en
  logo: assets/site/ayerstone-mark.svg
  favicon: assets/site/ayerstone-mark.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/p1ng3r/Ayerstone-Setting-Guide

nav:
  - Home: index.md
  - Player Guide:
      - Overview: player-guide/index.md
      - What Is Arkflight?: player-guide/what-is-arkflight.md
      - Ayerstone Overview: player-guide/ayerstone-overview.md
      - Ayerstone Atlas: player-guide/ayerstone-atlas.md
      - Chainbound Isles: player-guide/chainbound-isles.md
  - Chainbound Isles:
      - Vael'Tharis: chainbound-isles/vaeltharis.md
      - Skullwatch Depot: chainbound-isles/skullwatch-depot.md
      - Glacivane: chainbound-isles/glacivane.md
  - Factions:
      - Overview: factions/index.md
      - Brotherhood of the Cosmic Flame: factions/brotherhood-cosmic-flame.md
      - Grelkin Cartel: factions/grelkin-cartel.md
  - Districts:
      - Overview: districts/index.md
      - Grand Docks: districts/grand-docks.md
      - Merchant Reach: districts/merchants-reach.md
      - Driftwall: districts/driftwall.md
      - Crownward: districts/crownward.md
      - Noble Row: districts/noble-row.md
      - Portal Lake: districts/portal-lake.md
